<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D2A679" />
      <stop offset="100%" style="stop-color:#B8865C" />
    </linearGradient>
    <linearGradient id="bellyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5E6D0" />
      <stop offset="100%" style="stop-color:#E8D0B0" />
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700" />
      <stop offset="50%" style="stop-color:#FFC107" />
      <stop offset="100%" style="stop-color:#FF9800" />
    </linearGradient>
    <radialGradient id="coinShine" cx="35%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Spines (behind body) - big and filling top -->
  <ellipse cx="160" cy="60" rx="30" ry="70" fill="#8B6C42" transform="rotate(-30, 160, 60)"/>
  <ellipse cx="210" cy="30" rx="28" ry="75" fill="#7A5C35" transform="rotate(-15, 210, 30)"/>
  <ellipse cx="260" cy="18" rx="26" ry="78" fill="#8B6C42"/>
  <ellipse cx="310" cy="28" rx="28" ry="76" fill="#7A5C35" transform="rotate(12, 310, 28)"/>
  <ellipse cx="355" cy="55" rx="28" ry="70" fill="#8B6C42" transform="rotate(28, 355, 55)"/>
  <ellipse cx="120" cy="100" rx="26" ry="60" fill="#7A5C35" transform="rotate(-45, 120, 100)"/>
  <ellipse cx="395" cy="95" rx="26" ry="62" fill="#7A5C35" transform="rotate(42, 395, 95)"/>
  <ellipse cx="95" cy="155" rx="24" ry="55" fill="#8B6C42" transform="rotate(-55, 95, 155)"/>
  <ellipse cx="415" cy="145" rx="24" ry="55" fill="#8B6C42" transform="rotate(55, 415, 145)"/>
  <!-- Second layer -->
  <ellipse cx="185" cy="45" rx="24" ry="65" fill="#9B7C52" transform="rotate(-20, 185, 45)"/>
  <ellipse cx="235" cy="25" rx="22" ry="70" fill="#6B4C25" transform="rotate(-8, 235, 25)"/>
  <ellipse cx="285" cy="22" rx="22" ry="72" fill="#9B7C52" transform="rotate(6, 285, 22)"/>
  <ellipse cx="335" cy="40" rx="24" ry="68" fill="#6B4C25" transform="rotate(20, 335, 40)"/>
  <ellipse cx="140" cy="80" rx="22" ry="58" fill="#9B7C52" transform="rotate(-38, 140, 80)"/>
  <ellipse cx="375" cy="75" rx="22" ry="58" fill="#9B7C52" transform="rotate(36, 375, 75)"/>
  <ellipse cx="108" cy="130" rx="20" ry="50" fill="#6B4C25" transform="rotate(-50, 108, 130)"/>
  <ellipse cx="405" cy="120" rx="20" ry="52" fill="#6B4C25" transform="rotate(48, 405, 120)"/>

  <!-- Body (big round hedgehog) -->
  <ellipse cx="256" cy="295" rx="195" ry="185" fill="url(#bodyGrad)"/>

  <!-- Belly -->
  <ellipse cx="256" cy="330" rx="140" ry="135" fill="url(#bellyGrad)"/>

  <!-- Face area / snout -->
  <ellipse cx="256" cy="300" rx="75" ry="55" fill="#F5E6D0"/>

  <!-- Eyes - BIG kawaii -->
  <ellipse cx="210" cy="265" rx="36" ry="40" fill="white"/>
  <ellipse cx="302" cy="265" rx="36" ry="40" fill="white"/>
  <!-- Irises -->
  <ellipse cx="215" cy="270" rx="24" ry="28" fill="#2C1810"/>
  <ellipse cx="307" cy="270" rx="24" ry="28" fill="#2C1810"/>
  <!-- Pupils -->
  <circle cx="218" cy="268" r="13" fill="black"/>
  <circle cx="310" cy="268" r="13" fill="black"/>
  <!-- Eye highlights -->
  <circle cx="225" cy="258" r="10" fill="white" opacity="0.95"/>
  <circle cx="317" cy="258" r="10" fill="white" opacity="0.95"/>
  <circle cx="212" cy="275" r="5" fill="white" opacity="0.7"/>
  <circle cx="304" cy="275" r="5" fill="white" opacity="0.7"/>

  <!-- Nose -->
  <ellipse cx="256" cy="300" rx="12" ry="9" fill="#4A3228"/>
  <!-- Nose highlight -->
  <ellipse cx="253" cy="297" rx="4" ry="3" fill="white" opacity="0.3"/>

  <!-- Mouth -->
  <path d="M 244 315 Q 250 325 256 315" fill="none" stroke="#4A3228" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 256 315 Q 262 325 268 315" fill="none" stroke="#4A3228" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Blush -->
  <ellipse cx="175" cy="305" rx="28" ry="18" fill="#FF9999" opacity="0.4"/>
  <ellipse cx="337" cy="305" rx="28" ry="18" fill="#FF9999" opacity="0.4"/>

  <!-- Ears -->
  <ellipse cx="165" cy="210" rx="28" ry="35" fill="#C49A6C"/>
  <ellipse cx="165" cy="210" rx="18" ry="24" fill="#FFD0B0"/>
  <ellipse cx="347" cy="210" rx="28" ry="35" fill="#C49A6C"/>
  <ellipse cx="347" cy="210" rx="18" ry="24" fill="#FFD0B0"/>

  <!-- Feet -->
  <ellipse cx="185" cy="465" rx="42" ry="22" fill="#C49A6C"/>
  <ellipse cx="327" cy="465" rx="42" ry="22" fill="#C49A6C"/>
  <!-- Toe lines -->
  <line x1="172" y1="460" x2="172" y2="472" stroke="#A07850" stroke-width="2" stroke-linecap="round"/>
  <line x1="185" y1="462" x2="185" y2="474" stroke="#A07850" stroke-width="2" stroke-linecap="round"/>
  <line x1="198" y1="460" x2="198" y2="472" stroke="#A07850" stroke-width="2" stroke-linecap="round"/>
  <line x1="314" y1="460" x2="314" y2="472" stroke="#A07850" stroke-width="2" stroke-linecap="round"/>
  <line x1="327" y1="462" x2="327" y2="474" stroke="#A07850" stroke-width="2" stroke-linecap="round"/>
  <line x1="340" y1="460" x2="340" y2="472" stroke="#A07850" stroke-width="2" stroke-linecap="round"/>

  <!-- Left paw -->
  <ellipse cx="100" cy="380" rx="32" ry="22" fill="#C49A6C" transform="rotate(-25, 100, 380)"/>

  <!-- Right paw (holding coin) -->
  <ellipse cx="412" cy="370" rx="32" ry="22" fill="#C49A6C" transform="rotate(20, 412, 370)"/>

  <!-- Dollar coin -->
  <circle cx="440" cy="410" r="65" fill="url(#coinGrad)" stroke="#CC8400" stroke-width="5"/>
  <circle cx="440" cy="410" r="50" fill="none" stroke="#DAA520" stroke-width="3" opacity="0.5"/>
  <circle cx="440" cy="410" r="65" fill="url(#coinShine)"/>
  <text x="440" y="435" font-family="Arial, sans-serif" font-size="70"
        font-weight="bold" fill="#B8860B" text-anchor="middle">$</text>
  <text x="439" y="434" font-family="Arial, sans-serif" font-size="70"
        font-weight="bold" fill="#FFF8DC" text-anchor="middle" opacity="0.85">$</text>

  <!-- Paw fingers over coin (in front) -->
  <ellipse cx="418" cy="365" rx="12" ry="8" fill="#C49A6C" transform="rotate(30, 418, 365)"/>
  <ellipse cx="430" cy="358" rx="11" ry="7" fill="#C49A6C" transform="rotate(20, 430, 358)"/>

  <!-- Sparkles -->
  <g transform="translate(495, 355)">
    <line x1="0" y1="-12" x2="0" y2="12" stroke="#FFD700" stroke-width="4" stroke-linecap="round"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#FFD700" stroke-width="4" stroke-linecap="round"/>
  </g>
  <g transform="translate(480, 340)">
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#FFF176" stroke-width="3" stroke-linecap="round"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#FFF176" stroke-width="3" stroke-linecap="round"/>
  </g>
  <g transform="translate(500, 430)">
    <line x1="0" y1="-7" x2="0" y2="7" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="-7" y1="0" x2="7" y2="0" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
